############################################################
# RiboLongShort configuration file
# Edit this file before running the pipeline.
############################################################

############################################################
# PROJECT SETTINGS
############################################################

project_root: "/path/to/your/project"
threads: 20

############################################################
# INPUT DATA
############################################################

input_type: "sra"

samples:
  - run_id: "RUN_ACCESSION_1"
    sample_name: "sample_1"

  - run_id: "RUN_ACCESSION_2"
    sample_name: "sample_2"

############################################################
# ADAPTER DATABASE
############################################################

adapter_file: "resources/adapters/illumina_adapters.txt"

############################################################
# OUTPUT SETTINGS
############################################################

multiqc_report_name: "RiboLongShort_MultiQC.html"
qc_summary_name: "RiboLongShort_QC_summary.tsv"
