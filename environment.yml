name: ribolongsmorf_env

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:

  # ====================================================
  # Core
  # ====================================================

  - python=3.10
  - pip
  - pyyaml

  # ====================================================
  # Alignment
  # ====================================================

  - star>=2.7
  - bowtie>=1.3
  - samtools
  - bedtools
  - subread

  # ====================================================
  # Data retrieval
  # ====================================================

  - sra-tools>=3.0

  # ====================================================
  # Quality control
  # ====================================================

  - fastqc>=0.12
  - multiqc>=1.15

  # ====================================================
  # Utilities
  # ====================================================

  - pigz
  - parallel
  - git
  - seqkit

  # ====================================================
  # R
  # ====================================================

  - r-base=4.3

  # CRAN
  - r-ggplot2
  - r-dplyr
  - r-tidyr
  - r-readr
  - r-stringr
  - r-patchwork
  - r-tibble

  # ====================================================
  # Bioconductor
  # ====================================================

  - bioconductor-deseq2
  - bioconductor-edger

  - bioconductor-genomicfeatures
  - bioconductor-genomicranges
  - bioconductor-genomicalignments

  - bioconductor-rsamtools
  - bioconductor-rtracklayer

  # ====================================================
  # Python
  # ====================================================

  - pandas
  - numpy
  - scipy
  - matplotlib
