name: bio_env

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core
  - python=3.10
  - pip

  # Alignment
  - star>=2.7
  - bowtie>=1.3
  - samtools
  - bedtools
  - subread

  # Data retrieval
  - sra-tools>=3.0

  # Quality control
  - fastqc>=0.12
  - multiqc>=1.15

  # Utilities
  - pigz
  - parallel
  - git

  # RNA-seq downstream
  - r-base=4.3
  - bioconductor-deseq2
  - bioconductor-edger
  - bioconductor-genomicfeatures
  - bioconductor-rtracklayer

  # Python downstream
  - pandas
  - numpy
  - scipy
  - matplotlib
  - seaborn
